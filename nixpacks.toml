[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan event:cache"
]

# Migrate on each deploy then start the web server. The queue worker runs in
# a separate Railway service that uses this same image but overrides the start
# command (set Settings → Start Command to `php artisan queue:work --tries=3`).
[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
